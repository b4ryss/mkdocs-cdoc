name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Step: Environment Setup
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies and plugin
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pylint flake8 mypy
          pip install -e . # Install the plugin in editable mode

      # 2. Step: Static Analysis
      - name: Static Analysis (Linting)
        run: |
          flake8 mkdocs_cdoc/ --exit-zero 
          pylint mkdocs_cdoc/ --fail-under=5.0 || true
          mypy mkdocs_cdoc/ --ignore-missing-imports || true

      # 3. Step: Unit & Integration Tests
      - name: Run Unit & Integration tests
        run: |
          # If tests fail, the pipeline will stop here
          pytest tests/

      # 4. Step: Coverage Report
      - name: Generate Coverage report
        run: |
          # Display coverage percentage in the output
          pytest --cov=mkdocs_cdoc --cov-report=term-missing tests/

      # 5. Step: Build Validation
      - name: Build validation
        run: |
          # Verify that the plugin produces a valid site without errors
          mkdocs build -f example_docs/mkdocs.yml || mkdocs build
